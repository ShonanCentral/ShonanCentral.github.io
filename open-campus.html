<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>オープンキャンパス | 湘南中央大学</title>

  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: #ffffff;
      color: #111;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* ===== TOP BAR ===== */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 48px;
      background: #0b2a44;
      color: #ffffff;
      font-size: 14px;
    }

    .top-bar a,
    .top-bar a:visited,
    .top-bar a:hover,
    .top-bar a:active {
      color: #ffffff;
    }

    .top-left {
      display: flex;
      align-items: center;
      white-space: nowrap;
    }

    .logo {
      height: 56px;
      margin-right: 14px;
    }

    .univ-line {
      display: flex;
      align-items: center;
    }

    .univ-name {
      font-weight: 600;
      font-size: 15px;
      margin-right: 18px;
    }

    .nav-item {
      padding: 0 12px;
      cursor: pointer;
    }

    .nav-item:hover {
      text-decoration: underline;
    }

    .nav-item.active {
      text-decoration: underline;
    }

    .top-right {
      display: flex;
      align-items: center;
      gap: 18px;
      white-space: nowrap;
    }

    /* ===== PAGE HEADER ===== */
    .page-header {
      background: #f2f4f7;
      padding: 64px 48px;
    }

    .page-header h1 {
      margin: 0;
      font-size: 32px;
      font-weight: 600;
    }

    .page-header p {
      margin-top: 14px;
      color: #555;
      font-size: 15px;
      line-height: 1.8;
    }

    /* ===== CONTENT ===== */
    .content {
      padding: 72px 48px;
      max-width: 1000px;
      margin: 0 auto;
    }

    .content h2 {
      margin-top: 0;
      font-size: 22px;
    }

    .content p {
      line-height: 1.8;
      color: #444;
    }

    /* ===== INFO BOX ===== */
    .info-box {
      margin-top: 32px;
      padding: 24px;
      background: #fafafa;
      border-left: 4px solid #0b2a44;
    }

    footer {
      margin-top: 80px;
      padding: 24px 48px;
      font-size: 12px;
      color: #777;
      border-top: 1px solid #ddd;
    }
  </style>
</head>

<body>

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="top-left">
      <a href="index.html">
        <img src="newemblem.png" alt="湘南中央大学 校章" class="logo">
      </a>

      <div class="univ-line">
        <span class="univ-name">湘南中央大学</span>
        <span class="nav-item">教育</span>
        <span class="nav-item">研究</span>
        <span class="nav-item">社会連携</span>
        <a href="exam.html" class="nav-item">受験生</a>
        <span class="nav-item active">オープンキャンパス</span>
        <span class="nav-item">LINE公式</span>
        <span class="nav-item">卒業生</span>
        <span class="nav-item">保護者等</span>
        <span class="nav-item">在学生・教職員</span>
        <span class="nav-item">一般・連携</span>
      </div>
    </div>

    <div class="top-right">
      <span>ご寄付</span>
      <span>アクセス</span>
      <span>データ集</span>
      <span>検索</span>
      <span>Language</span>
    </div>
  </div>

  <!-- PAGE HEADER -->
  <section class="page-header">
    <h1>オープンキャンパス</h1>
    <p>
      湘南中央大学のキャンパスを実際に体験できるオープンキャンパスを開催しています。<br>
      大学の雰囲気や学びを、ぜひ肌で感じてください。
    </p>
  </section>

  <!-- CONTENT -->
  <main class="content">
    <h2>開催情報について</h2>
    <p>
      オープンキャンパスの開催日程、プログラム内容、参加方法などの詳細は、
      現在準備中です。
    </p>

    <div class="info-box">
      <p>
        ※ 最新の情報は、公式サイトおよびLINE公式アカウントにてご案内予定です。
      </p>
    </div>
  </main>

  <footer>
    © 湘南中央大学
  </footer>

</body>
</html>
