<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>湘南中央大学 | Shonan Central University</title>

  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: #ffffff;
    }

    /* ===== TOP BAR ===== */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 48px;
      background: #0b2a44;
      color: #ffffff;
      font-size: 14px;
    }

    /* ---------- LEFT ---------- */
    .top-left {
      display: flex;
      align-items: center;
      white-space: nowrap;
    }

    .logo {
      height: 56px;
      margin-right: 14px;
    }

    .univ-line {
      display: flex;
      align-items: center;
    }

    .univ-name {
      font-weight: 600;
      font-size: 15px;
      padding: 0 14px;
    }

    .nav-item {
      padding: 0 14px;
      cursor: pointer;
    }

    .nav-item:hover {
      text-decoration: underline;
    }

    /* ---------- RIGHT ---------- */
    .top-right {
      display: flex;
      align-items: center;
    }

    .right-nav {
      display: flex;
      align-items: center;
      gap: 0;
    }

    /* |  ITEM  | を1セットで表現 */
    .right-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 6px;
      cursor: pointer;
    }

    .right-item::before,
    .right-item::after {
      content: "|";
      color: rgba(255,255,255,0.6);
      pointer-events: none;
    }

    .right-item:hover span {
      text-decoration: underline;
    }

    /* ===== HERO ===== */
    .hero {
      position: relative;
      min-height: calc(100vh - 88px);
      background-image: url("enosima.jpg");
      background-size: cover;
      background-position: center;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.35);
    }

    .hero-text {
      position: absolute;
      bottom: 18%;
      right: 8%;
      color: #ffffff;
      text-align: right;
      z-index: 1;
    }

    .hero-en {
      font-size: 56px;
      font-weight: 600;
      line-height: 1.15;
    }

    .hero-ja {
      font-size: 18px;
      letter-spacing: 0.2em;
      margin-top: 14px;
      opacity: 0.9;
    }
  </style>
</head>

<body>

  <!-- TOP BAR -->
  <div class="top-bar">

    <!-- LEFT -->
    <div class="top-left">
      <img src="newemblem.png" alt="湘南中央大学 校章" class="logo">

      <div class="univ-line">
        <span class="univ-name">湘南中央大学</span>

        <span class="nav-item">教育</span>
        <span class="nav-item">研究</span>
        <span class="nav-item">社会連携</span>

        <span class="nav-item">LINE公式</span>
        <span class="nav-item">受験生</span>
        <span class="nav-item">卒業生</span>
        <span class="nav-item">保護者等</span>
        <span class="nav-item">在学生・教職員</span>
        <span class="nav-item">一般・連携</span>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="top-right">
      <div class="right-nav">
        <div class="right-item"><span>ご寄付</span></div>
        <div class="right-item"><span>アクセス</span></div>
        <div class="right-item"><span>データ集</span></div>
        <div class="right-item"><span>検索</span></div>
        <div class="right-item"><span>Language</span></div>
      </div>
    </div>

  </div>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-text">
      <div class="hero-en">
        From Shonan<br>
        To the World
      </div>
      <div class="hero-ja">
        湘南を起点に、世界を舞台に。
      </div>
    </div>
  </section>

</body>
</html>
