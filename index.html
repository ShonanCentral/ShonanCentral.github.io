<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>湘南中央大学 | Shonan Central University</title>

  <style>
    /* ===== Base ===== */
    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      color: #111;
      background: #ffffff;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* ===== Header ===== */
    header {
      display: flex;
      align-items: center;
      gap: 22px;
      padding: 22px 60px;
      background: #0b2a44;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }

    .emblem {
      width: 56px;
    }

    .header-text {
      display: flex;
      flex-direction: column;
    }

    .univ-en {
      font-size: 13px;
      letter-spacing: 0.18em;
      color: #cfd8e3;
    }

    .univ-ja {
      font-size: 30px;
      font-weight: 600;
      margin-top: 4px;
      color: #ffffff;
    }

    /* ===== Utility Nav ===== */
    .utility-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 60px;
      background: #5a5a5a;
      color: #ffffff;
      font-size: 13px;
    }

    .utility-left,
    .utility-right {
      display: flex;
      align-items: center;
      gap: 26px;
    }

    .utility-left span,
    .utility-right span {
      cursor: pointer;
      white-space: nowrap;
    }

    .utility-left span:hover,
    .utility-right span:hover {
      text-decoration: underline;
    }

    /* ===== Hero ===== */
    .hero {
      position: relative;
      min-height: calc(100vh - 150px);
      background-image: url("enosima.jpg");
      background-size: cover;
      background-position: center;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.35);
    }

    .hero-text {
      position: absolute;
      bottom: 18%;
      right: 8%;
      color: #ffffff;
      text-align: right;
      z-index: 1;
    }

    .hero-en {
      font-size: 56px;
      font-weight: 600;
      line-height: 1.15;
      margin-bottom: 18px;
    }

    .hero-ja {
      font-size: 18px;
      letter-spacing: 0.2em;
      opacity: 0.9;
    }

    /* ===== Footer ===== */
    footer {
      padding: 30px 60px;
      font-size: 12px;
      color: #777;
      border-top: 1px solid #ddd;
    }
  </style>
</head>

<body>

  <!-- Header -->
  <header>
    <img src="emblem.png" alt="湘南中央大学 校章" class="emblem">
    <div class="header-text">
      <div class="univ-en">SHONAN CENTRAL UNIVERSITY</div>
      <div class="univ-ja">湘南中央大学</div>
    </div>
  </header>

  <!-- Utility Navigation -->
  <nav class="utility-nav">
    <div class="utility-left">
      <span>LINE公式</span>
      <span>受験生</span>
      <span>卒業生</span>
      <span>保護者等</span>
      <span>在学生・教職員</span>
      <span>一般・連携</span>
    </div>

    <div class="utility-right">
      <span>ご寄付</span>
      <span>アクセス</span>
      <span>データ集</span>
      <span>検索</span>
      <span>Language</span>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero">
    <div class="hero-text">
      <div class="hero-en">
        From Shonan<br>
        To the World
      </div>
      <div class="hero-ja">
        湘南を起点に、世界を舞台に。
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    © Shonan Central University
  </footer>

</body>
</html>
