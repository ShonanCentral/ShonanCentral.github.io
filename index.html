<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>湘南中央大学 | Shonan Central University</title>

  <style>
    /* ===== Base ===== */
    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      color: #111;
      background: #ffffff;
    }

    /* ===== Header ===== */
    header {
      display: flex;
      align-items: center;
      gap: 22px;
      padding: 22px 60px;
      background: #0b2a44; /* 深いネイビー */
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }

    .emblem {
      width: 56px;
      height: auto;
    }

    .header-text {
      display: flex;
      flex-direction: column;
    }

    .univ-en {
      font-size: 13px;
      letter-spacing: 0.18em;
      color: #cfd8e3;
    }

    .univ-ja {
      font-size: 30px;
      font-weight: 600;
      margin-top: 4px;
      color: #ffffff;
    }

    /* ===== Hero ===== */
    .hero {
      position: relative;
      min-height: calc(100vh - 96px); /* ヘッダー分を引く */
      background-image: url("enosima.jpg");
      background-size: cover;
      background-position: center;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
    }

    .hero-text {
      position: absolute;
      bottom: 18%;
      right: 8%;
      color: #ffffff;
      text-align: right;
      z-index: 1;
    }

    .hero-en {
      font-size: 56px;
      font-weight: 600;
      line-height: 1.15;
      margin-bottom: 18px;
    }

    .hero-ja {
      font-size: 18px;
      letter-spacing: 0.2em;
      opacity: 0.9;
    }

    /* ===== Footer ===== */
    footer {
      padding: 30px 60px;
      font-size: 12px;
      color: #777;
      border-top: 1px solid #ddd;
    }
  </style>
</head>

<body>

  <header>
    <!-- 校章 -->
    <img src="emblem.png" alt="湘南中央大学 校章" class="emblem">

    <!-- 大学名 -->
    <div class="header-text">
      <div class="univ-en">SHONAN CENTRAL UNIVERSITY</div>
      <div class="univ-ja">湘南中央大学</div>
    </div>
  </header>

  <section class="hero">
    <div class="hero-text">
      <div class="hero-en">
        From Shonan<br>
        To the World
      </div>
      <div class="hero-ja">
        湘南を起点に、世界を舞台に。
      </div>
    </div>
  </section>

  <footer>
    © Shonan Central University
  </footer>

</body>
</html>
