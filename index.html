<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>湘南中央大学 | Shonan Central University</title>

  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: #ffffff;
    }

    /* ===== Top Bar ===== */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 48px;
      background: #0b2a44; /* ネイビーブルー */
      color: #ffffff;
      font-size: 14px;
    }

    .top-left,
    .top-right {
      display: flex;
      align-items: center;
      gap: 18px;
      white-space: nowrap;
    }

    /* 校章 */
    .logo {
      height: 52px; /* 少し大きめ */
      margin-right: 10px;
    }

    /* 大学名＋区切り */
    .univ-line {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 15px;
      letter-spacing: 0.08em;
    }

    .univ-name {
      font-weight: 600;
    }

    .univ-tag::before {
      content: "｜";
      margin: 0 10px 0 4px;
      color: rgba(255,255,255,0.6);
    }

    .top-left span,
    .top-right span {
      cursor: pointer;
    }

    .top-left span:hover,
    .top-right span:hover {
      text-decoration: underline;
    }

    /* ===== Hero ===== */
    .hero {
      position: relative;
      min-height: calc(100vh - 84px);
      background-image: url("enosima.jpg");
      background-size: cover;
      background-position: center;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.35);
    }

    .hero-text {
      position: absolute;
      bottom: 18%;
      right: 8%;
      color: #ffffff;
      text-align: right;
      z-index: 1;
    }

    .hero-en {
      font-size: 56px;
      font-weight: 600;
      line-height: 1.15;
    }

    .hero-ja {
      font-size: 18px;
      letter-spacing: 0.2em;
      margin-top: 14px;
      opacity: 0.9;
    }
  </style>
</head>

<body>

  <!-- TOP BAR -->
  <div class="top-bar">

    <div class="top-left">
      <!-- 校章 -->
      <img src="newemblem.png" alt="湘南中央大学 校章" class="logo">

      <!-- 大学名＋区切りワード -->
      <div class="univ-line">
        <span class="univ-name">湘南中央大学</span>
        <span class="univ-tag">教育</span>
        <span class="univ-tag">研究</span>
        <span class="univ-tag">社会連携</span>
      </div>

      <!-- 利用者別ナビ -->
      <span class="univ-tag">LINE公式</span>
      <span class="univ-tag">受験生</span>
      <span class="univ-tag">卒業生</span>
      <span class="univ-tag">保護者等</span>
      <span class="univ-tag">在学生・教職員</span>
      <span class="univ-tag">一般・連携</span>
    </div>

    <div class="top-right">
      <span>ご寄付</span>
      <span>アクセス</span>
      <span>データ集</span>
      <span>検索</span>
      <span>Language</span>
    </div>

  </div>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-text">
      <div class="hero-en">
        From Shonan<br>
        To the World
      </div>
      <div class="hero-ja">
        湘南を起点に、世界を舞台に。
      </div>
    </div>
  </section>

</body>
</html>
