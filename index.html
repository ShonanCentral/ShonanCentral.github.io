<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>湘南中央大学</title>
  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
    }
    .hero {
      position: relative;
      height: 100vh;
      background-image: url("enosima.jpg");
      background-size: cover;
      background-position: center;
    }
    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.35);
    }
    .hero-text {
      position: absolute;
      bottom: 15%;
      right: 10%;
      color: white;
      z-index: 1;
      text-align: right;
    }
    .hero-text h1 {
      font-size: 48px;
      margin: 0 0 10px;
    }
    .hero-text p {
      font-size: 20px;
      margin: 0;
    }
  </style>
</head>
<body>

<div class="hero-text">
  <div class="hero-en">From Shonan to the World</div>
  <div class="hero-ja">湘南を起点に、世界を舞台に。</div>
</div>
  </div>

</body>
</html>
