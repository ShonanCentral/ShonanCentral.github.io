<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>湘南中央大学 | Shonan Central University</title>

  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: #ffffff;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* ===== Top Bar (ALL IN ONE) ===== */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 40px;
      background: #5a5a5a;
      color: #ffffff;
      font-size: 13px;
    }

    .top-left,
    .top-right {
      display: flex;
      align-items: center;
      gap: 26px;
      white-space: nowrap;
    }

    .logo {
      height: 44px;
      margin-right: 20px;
    }

    .top-left span,
    .top-right span {
      cursor: pointer;
    }

    .top-left span:hover,
    .top-right span:hover {
      text-decoration: underline;
    }

    /* ===== Hero ===== */
    .hero {
      position: relative;
      min-height: calc(100vh - 72px); /* 上バー分 */
      background-image: url("enosima.jpg");
      background-size: cover;
      background-position: center;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.35);
    }

    .hero-text {
      position: absolute;
      bottom: 18%;
      right: 8%;
      color: #ffffff;
      text-align: right;
      z-index: 1;
    }

    .hero-en {
      font-size: 56px;
      font-weight: 600;
      line-height: 1.15;
    }

    .hero-ja {
      font-size: 18px;
      letter-spacing: 0.2em;
      margin-top: 14px;
      opacity: 0.9;
    }
  </style>
</head>

<body>

  <!-- TOP BAR -->
  <div class="top-bar">

    <div class="top-left">
      <!-- emblem.png に大学名込み -->
      <img src="emblem.png" alt="湘南中央大学" class="logo">

      <span>LINE公式</span>
      <span>受験生</span>
      <span>卒業生</span>
      <span>保護者等</span>
      <span>在学生・教職員</span>
      <span>一般・連携</span>
    </div>

    <div class="top-right">
      <span>ご寄付</span>
      <span>アクセス</span>
      <span>データ集</span>
      <span>検索</span>
      <span>Language</span>
    </div>

  </div>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-text">
      <div class="hero-en">
        From Shonan<br>
        To the World
      </div>
      <div class="hero-ja">
        湘南を起点に、世界を舞台に。
      </div>
    </div>
  </section>

</body>
</html>
