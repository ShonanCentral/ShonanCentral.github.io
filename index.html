<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>湘南中央大学 | Shonan Central University</title>

  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: #ffffff;
    }

    /* ===== Header ===== */
    header {
      display: flex;
      align-items: center;
      gap: 22px;
      padding: 22px 60px;
      background: #0b2a44;
    }

    .emblem {
      width: 56px;
    }

    .header-main {
      display: flex;
      flex-direction: column;
    }

    .univ-en {
      font-size: 13px;
      letter-spacing: 0.18em;
      color: #cfd8e3;
    }

    .univ-line {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 4px;
      color: #ffffff;
    }

    .univ-ja {
      font-size: 30px;
      font-weight: 600;
      white-space: nowrap;
    }

    .univ-tags {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      letter-spacing: 0.15em;
      color: #cfd8e3;
    }

    .univ-tags span::before {
      content: "｜";
      margin-right: 10px;
      color: rgba(255,255,255,0.5);
    }

    /* ===== Utility Nav ===== */
    .utility-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 60px;
      background: #5a5a5a;
      color: #ffffff;
      font-size: 13px;
    }

    .utility-left,
    .utility-right {
      display: flex;
      gap: 26px;
      white-space: nowrap;
    }

    /* ===== Hero ===== */
    .hero {
      position: relative;
      min-height: calc(100vh - 160px);
      background-image: url("enosima.jpg");
      background-size: cover;
      background-position: center;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.35);
    }

    .hero-text {
      position: absolute;
      bottom: 18%;
      right: 8%;
      color: #ffffff;
      text-align: right;
      z-index: 1;
    }

    .hero-en {
      font-size: 56px;
      font-weight: 600;
      line-height: 1.15;
    }

    .hero-ja {
      font-size: 18px;
      letter-spacing: 0.2em;
      margin-top: 14px;
      opacity: 0.9;
    }
  </style>
</head>

<body>

  <!-- Header -->
  <header>
    <img src="emblem.png" alt="湘南中央大学 校章" class="emblem">

    <div class="header-main">
      <div class="univ-en">SHONAN CENTRAL UNIVERSITY</div>

      <div class="univ-line">
        <div class="univ-ja">湘南中央大学</div>

        <div class="univ-tags">
          <span>教育</span>
          <span>研究</span>
          <span>社会連携</span>
        </div>
      </div>
    </div>
  </header>

  <!-- Utility Nav -->
  <nav class="utility-nav">
    <div class="utility-left">
      <span>LINE公式</span>
      <span>受験生</span>
      <span>卒業生</span>
      <span>保護者等</span>
      <span>在学生・教職員</span>
      <span>一般・連携</span>
    </div>

    <div class="utility-right">
      <span>ご寄付</span>
      <span>アクセス</span>
      <span>データ集</span>
      <span>検索</span>
      <span>Language</span>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero">
    <div class="hero-text">
      <div class="hero-en">From Shonan<br>To the World</div>
      <div class="hero-ja">湘南を起点に、世界を舞台に。</div>
    </div>
  </section>

</body>
</html>
